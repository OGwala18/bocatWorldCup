[build]
  base = "frontend"
  command = "npm ci && npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "22"
  NETLIFY_NEXT_PLUGIN_SKIP = "true"
  VITE_API_BASE = "https://bocatworldcup.onrender.com"

[[redirects]]
  from = "/api/*"
  to = "/api-not-configured.json"
  status = 404
  force = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
